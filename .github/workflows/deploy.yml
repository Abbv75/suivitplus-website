name: Deploy to FTP

on:
  push:
    branches:
      - main
  # Permet également de déclencher le workflow manuellement
  workflow_dispatch:

jobs:
  web-deploy:
    name: 🎉 Déploiement FTP
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Récupération du code
      uses: actions/checkout@v4
    
    - name: 📦 Configuration de Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 🔨 Installation des dépendances
      run: npm install

    - name: 🏗️ Build du projet (Vite)
      run: npm run build

    - name: 📂 Synchronisation FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.3
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/
        # Vous pouvez modifier le dossier de destination si votre serveur l'exige (ex: /public_html/, /www/)
        server-dir: ./
